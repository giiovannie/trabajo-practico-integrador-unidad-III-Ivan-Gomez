<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <title>wiki-homero</title>
  </head>
  <body>
    <header
      class="bg-warning d-flex align-items-center justify-content-between gap-4 w-100"
    >
      <img src="/assets/img/donut-oink.png" alt="rosquilla icono" />
      <h1 class="text-light fs-1 fw-bold">SIMPSONISATE</h1>
      <img src="/assets/img/homer.png" alt="homero simpson" />
    </header>

    <main class="p-4 bg-body-secondary min-vh-100">
      <div class="container-fluid">
        <!------------------------ barra de busqueda ---------------------------------------------->
        <form class="d-flex" id="form-buscar">
          <input
            class="form-control me-2"
            type="text"
            placeholder="Buscar personaje..."
            id="buscador"
          />

          <button
            class="btn btn-primary bg-warning border-warning"
            id="btn-primary"
          >
            Buscar
          </button>
          <!-- evento de btn -->
        </form>
        <!--------------- contenedor de tarjetas ---------------------------------------------->
        <div class="container-fluid">
          <div class="row g-2" id="card-container">
            <!-- <div class="card" style="width: 18rem">
              <img src="..." class="card-img-top" alt="..." />
              <div class="card-body">
                <h5 class="card-title">Card title</h5>
                <p class="card-text">
                </p>
                <a href="#" class="btn btn-primary">ver detalle</a>
              </div>
            </div> -->
          </div>
        </div>

        <!-- contenedor de la ventana modal -->

        <div>
          <div class="modal fade" id="miModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
              <div class="modal-content">

                <div class="modal-header">
                  <h5 class="modal-title" id="modalNombre"></h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                  <img id="modalImg" src="" alt="" class="img-fluid mb-3" />
                  <p><strong>Edad:</strong> <span id="modalEdad"></span></p>
                  <p><strong>Fecha de nacimiento:</strong> <span id="modalFecha"></span></p>
                  <p><strong>Género:</strong> <span id="modalGenero"></span></p>
                  <p><strong>Ocupación:</strong> <span id="modalOcupacion"></span></p>
                  <p><strong>Estado:</strong> <span id="modalEstado"></span></p>
                  <p><strong>Frase:</strong> <em id="modalFrase"></em></p>
                </div>

                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="/assets/js/script.js"></script>
  </body>
</html>
